<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ระบบลูกค้าวัคซีน</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background-image: linear-gradient(rgba(244, 246, 250, 0.7), rgba(244, 246, 250, 0.7)), 
                      url('biologic.png'); 
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 1100px;
    margin: auto;
}

.header {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 20px;
    background: rgba(255, 255, 255, 0.9);
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.header img {
    width: 60px;
}

.card {
    background: rgba(255, 255, 255, 0.92); 
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    margin-bottom: 20px;
    backdrop-filter: blur(5px);
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.form-grid input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    box-sizing: border-box;
}

.full {
    grid-column: span 2;
}

button {
    background: #3498db;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    background: #2980b9;
    transform: translateY(-2px);
}

.delete-btn {
    background: #e74c3c;
    padding: 5px 10px;
}

.delete-btn:hover {
    background: #c0392b;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th {
    background: #3498db;
    color: white;
    padding: 12px 8px;
    text-align: center;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

input.search {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <img src="logo.png" alt="Logo">
    <h2>ข้อมูลผู้มีส่วนได้ส่วนเสียภายนอก (สทช. ปากช่อง) By.Pond</h2>
</div>

<div class="card">
<form id="form">
<div class="form-grid">

<input type="date" id="date">
<input type="text" id="phone" placeholder="📞 เบอร์โทร">

<input type="text" id="name" placeholder="👤 ชื่อ (ไม่ใส่คำนำหน้า)">
<input type="text" id="lastname" placeholder="👤 สกุล">

<input type="text" id="houseNo" placeholder="🏠 บ้านเลขที่">
<input type="text" id="subdistrict" placeholder="ตำบล">

<input type="text" id="district" placeholder="อำเภอ">
<input type="text" id="province" placeholder="จังหวัด">

<div class="full">
    <input type="text" id="vaccine" placeholder="💉 ประเภทการติดต่อ">
</div>

<div class="full">
<button type="submit" id="submitBtn">💾 บันทึกข้อมูลเข้าระบบ</button>
</div>

</div>
</form>
</div>

<div class="card">
<h3>🔍 รายชื่อข้อมูลลูกค้า</h3>

<input type="text" id="search" class="search" placeholder="พิมพ์ชื่อเพื่อค้นหา..." onkeyup="searchTable()">

<button onclick="exportExcel()" style="background: #27ae60;">📥 ดาวน์โหลดไฟล์ Excel</button>

<br><br>

<table id="table">
<thead>
<tr>
    <th rowspan="3">ชื่อ-นามสกุล</th>
    <th rowspan="3">เบอร์โทร</th>
    <th colspan="4">ที่อยู่</th>
    <th rowspan="3">ประเภทการติดต่อ</th>
    <th rowspan="3">ลบ</th>
</tr>
<tr>
    <th colspan="4">ช่องทางการติดต่ออื่น ๆ</th>
</tr>
<tr>
    <th>บ้านเลขที่</th>
    <th>ตำบล</th>
    <th>อำเภอ</th>
    <th>จังหวัด</th>
</tr>
</thead>

<tbody>
</tbody>
</table>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
// *** URL ของ Google Apps Script ***
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyPBM1updwrAt4EZe-jbtKO972rlfXNTlUUvCHg4sMUeHL-sIxRtAP_HSJNCbkKsK8/exec";

let form = document.getElementById("form");
let table = document.getElementById("table");

window.onload = function() {
    loadData();
}

function loadData() {
    let tbody = table.querySelector("tbody");
    tbody.innerHTML = "<tr><td colspan='8'>⏳ กำลังโหลดข้อมูล...</td></tr>";

    fetch(SCRIPT_URL)
        .then(response => response.json())
        .then(data => {
            tbody.innerHTML = "";
            if (data && data.length > 0) {
                data.reverse().forEach(row => {
                    renderRow(row[0], row[1], row[2], row[3], row[4], row[5], row[6]);
                });
            } else {
                tbody.innerHTML = "<tr><td colspan='8'>ยังไม่มีข้อมูลในระบบ</td></tr>";
            }
        })
        .catch(error => {
            console.error('Error loading data:', error);
            tbody.innerHTML = "<tr><td colspan='8'>❌ ไม่สามารถดึงข้อมูลได้</td></tr>";
        });
}

function renderRow(name, phone, houseNo, subdistrict, district, province, vaccine) {
    let row = table.querySelector("tbody").insertRow();
    row.insertCell(0).innerText = name;
    row.insertCell(1).innerText = phone;
    row.insertCell(2).innerText = houseNo;
    row.insertCell(3).innerText = subdistrict;
    row.insertCell(4).innerText = district;
    row.insertCell(5).innerText = province;
    row.insertCell(6).innerText = vaccine;
    let deleteCell = row.insertCell(7);
    deleteCell.innerHTML = '<button class="delete-btn" onclick="deleteRow(this)">❌</button>';
}

form.onsubmit = function(e){
    e.preventDefault();
    
    let submitBtn = document.getElementById("submitBtn");
    submitBtn.innerText = "⏳ กำลังบันทึกข้อมูล...";
    submitBtn.disabled = true;

    let data = {
        name: document.getElementById("name").value + " " + document.getElementById("lastname").value,
        phone: document.getElementById("phone").value,
        houseNo: document.getElementById("houseNo").value,
        subdistrict: document.getElementById("subdistrict").value,
        district: document.getElementById("district").value,
        province: document.getElementById("province").value,
        vaccine: document.getElementById("vaccine").value
    };

    fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        cache: 'no-cache',
        body: JSON.stringify(data)
    })
    .then(() => {
        alert("✅ บันทึกข้อมูลสำเร็จ");
        form.reset();
        loadData(); 
    })
    .catch(error => {
        console.error('Error!', error.message);
        alert("❌ เกิดข้อผิดพลาดในการบันทึก");
    })
    .finally(() => {
        submitBtn.innerText = "💾 บันทึกข้อมูลเข้าระบบ";
        submitBtn.disabled = false;
    });
}

// ฟังก์ชันลบข้อมูลที่เชื่อมต่อกับ Google Sheets
function deleteRow(btn){
    let row = btn.parentNode.parentNode;
    let nameToDelete = row.cells[0].innerText;

    if(confirm(`ยืนยันการลบข้อมูลของ "${nameToDelete}" ออกจากระบบถาวร?`)) {
        btn.innerText = "⏳";
        btn.disabled = true;

        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                action: "delete",
                name: nameToDelete
            })
        })
        .then(() => {
            alert("✅ ลบข้อมูลออกจาก Google Sheets เรียบร้อยแล้ว");
            row.remove();
        })
        .catch(error => {
            alert("❌ เกิดข้อผิดพลาดในการลบ");
            console.error(error);
            btn.innerText = "❌";
            btn.disabled = false;
        });
    }
}

function searchTable(){
    let input = document.getElementById("search").value.toLowerCase();
    let rows = table.querySelector("tbody").getElementsByTagName("tr");

    for(let i=0; i < rows.length; i++){
        let name = rows[i].cells[0].innerText.toLowerCase();
        if(name === "⏳ กำลังโหลดข้อมูล...") continue;
        rows[i].style.display = name.includes(input) ? "" : "none";
    }
}

function exportExcel(){
    let wb = XLSX.utils.book_new();
    let data = [];

    data.push(["", "", "สำนักเทคโนโลยีชีวภัณฑ์สัตว์", "", "", ""]);
    data.push(["", "", "ข้อมูลผู้มีส่วนได้ส่วนเสียภายนอก", "", "", ""]);
    
    data.push(["ชื่อองค์กร/ชื่อ-นามสกุล*", "เบอร์โทรศัพท์", "บ้านเลขที่", "ตำบล", "อำเภอ", "จังหวัด", "ประเภทการติดต่อ*"]);

    let rows = document.querySelectorAll("#table tbody tr");
    rows.forEach((row) => {
        if(row.style.display === "none") return;
        let rowData = [];
        let cols = row.querySelectorAll("td");
        if(cols.length < 7) return; 
        for(let i=0; i<7; i++) rowData.push(cols[i].innerText);
        data.push(rowData);
    });

    let ws = XLSX.utils.aoa_to_sheet(data);
    XLSX.utils.book_append_sheet(wb, ws, "Data");
    XLSX.writeFile(wb, "Customer_Data.xlsx");
}
</script>

</body>
</html>
